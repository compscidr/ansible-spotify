name: Ansible Lint and Molecule Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ansible Lint # Naming the build is important to use it as a status check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        # optional (see below):
        with:
          args: ""
          setup_python: "true"
          working_directory: ""
          requirements_file: ""
  test:  
    name: Molecule Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.20,<2.21" molecule molecule-docker passlib
      - name: Run Molecule Test
        env:
          # molecule-docker's destroy playbook uses bare string conditionals
          # which ansible-core 2.20 rejects by default
          ANSIBLE_CONDITIONAL_BARE_VARS: "false"
        run: |
          molecule test --all
